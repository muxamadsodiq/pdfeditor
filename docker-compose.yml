services:
  backend:
    build:
      context: ./backend
    container_name: mkfid-sejdapdf-backend
    environment:
      STORAGE_ROOT: /app/storage
      CORS_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000","https://pdf.muhammadsodiq.com"]'
    volumes:
      - ./backend/storage:/app/storage
    ports:
      - "8801:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://pdf.muhammadsodiq.com}
    container_name: mkfid-sejdapdf-frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://pdf.muhammadsodiq.com}
    ports:
      - "3001:3000"
    depends_on:
      - backend
    restart: unless-stopped
